<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Selvam Medicals – Face Scan</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, sans-serif; background: #0A0D11; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    h1 { font-size: 22px; font-weight: 700; color: #F59E0B; margin-bottom: 6px; }
    .sub { font-size: 13px; color: #6B7280; margin-bottom: 28px; }

    .card { background: #161A1F; border: 1px solid rgba(104,104,104,0.4); border-radius: 20px; padding: 28px; width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; gap: 18px; }

    /* Video */
    .video-wrap { position: relative; width: 320px; height: 240px; border-radius: 12px; overflow: hidden; background: #0D1117; border: 2px solid rgba(104,104,104,0.3); }
    video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .video-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #374151; font-size: 13px; flex-direction: column; gap: 8px; }
    .video-placeholder i { font-size: 36px; }

    /* Status badge */
    .status { font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 20px; }
    .status.idle     { background: rgba(107,114,128,0.15); color: #6B7280; }
    .status.scanning { background: rgba(59,130,246,0.15);  color: #3B82F6; }
    .status.success  { background: rgba(34,197,94,0.15);   color: #22C55E; }
    .status.error    { background: rgba(239,68,68,0.15);   color: #EF4444; }

    /* Result box */
    .result-box { width: 100%; background: #1C2028; border-radius: 10px; padding: 14px 18px; display: none; }
    .result-box.show { display: block; }
    .result-name  { font-size: 18px; font-weight: 700; color: #F59E0B; }
    .result-phone { font-size: 13px; color: #9CA3AF; margin-top: 2px; }
    .result-conf  { font-size: 11px; color: #4B5563; margin-top: 6px; }

    /* Mode toggle */
    .mode-row { display: flex; gap: 8px; }
    .mode-btn { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid rgba(104,104,104,0.4); background: #1C2028; color: #6B7280; font-family: Inter, sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
    .mode-btn.active { background: #1D2D45; border-color: #3B82F6; color: #3B82F6; }

    /* Customer ID input (register mode) */
    .cust-row { width: 100%; display: none; flex-direction: column; gap: 6px; }
    .cust-row.show { display: flex; }
    .cust-row label { font-size: 12px; color: #6B7280; font-weight: 600; }
    .cust-row input { background: #1C2028; border: 1px solid rgba(104,104,104,0.4); border-radius: 8px; padding: 9px 12px; color: #fff; font-family: Inter, sans-serif; font-size: 14px; outline: none; width: 100%; }
    .cust-row input:focus { border-color: #3B82F6; }

    /* Action buttons */
    .btn-row { display: flex; gap: 8px; width: 100%; }
    .btn { flex: 1; padding: 11px; border-radius: 10px; border: none; font-family: Inter, sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-cam  { background: #1C2028; color: #9CA3AF; border: 1px solid rgba(104,104,104,0.4); }
    .btn-scan { background: #F59E0B; color: #000; }
    .btn-scan:hover:not(:disabled) { opacity: .85; }
  </style>
</head>
<body>

<h1>Face Scan</h1>
<p class="sub">Selvam Medicals — Customer Recognition</p>

<div class="card">

  <!-- Mode toggle -->
  <div class="mode-row" style="width:100%">
    <button class="mode-btn active" id="btnIdentify" onclick="setMode('identify')">
      <i class="fa-solid fa-magnifying-glass"></i> Identify
    </button>
    <button class="mode-btn" id="btnRegister" onclick="setMode('register')">
      <i class="fa-solid fa-user-plus"></i> Register
    </button>
  </div>

  <!-- Customer ID (register only) -->
  <div class="cust-row" id="custRow">
    <label for="custId">Customer ID</label>
    <input type="text" id="custId" placeholder="Enter customer ID...">
  </div>

  <!-- Video -->
  <div class="video-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div class="video-placeholder" id="placeholder">
      <i class="fa-solid fa-camera"></i>
      <span>Camera off</span>
    </div>
  </div>

  <!-- Status -->
  <div class="status idle" id="status">Ready</div>

  <!-- Result -->
  <div class="result-box" id="resultBox">
    <div class="result-name"  id="resultName"></div>
    <div class="result-phone" id="resultPhone"></div>
    <div class="result-conf"  id="resultConf"></div>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn btn-cam" id="btnCam" onclick="toggleCamera()">
      <i class="fa-solid fa-video"></i> Start Camera
    </button>
    <button class="btn btn-scan" id="btnScan" onclick="doScan()" disabled>
      <i class="fa-solid fa-face-smile"></i> Scan Face
    </button>
  </div>

</div>

<!-- face-api.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="{{ url_for('static', filename='js/face_detection.js') }}"></script>
<script>
  let mode = 'identify';
  let cameraStream = null;
  let cameraOn = false;

  const video       = document.getElementById('video');
  const placeholder = document.getElementById('placeholder');
  const statusEl    = document.getElementById('status');
  const resultBox   = document.getElementById('resultBox');
  const btnCam      = document.getElementById('btnCam');
  const btnScan     = document.getElementById('btnScan');

  function setMode(m) {
    mode = m;
    document.getElementById('btnIdentify').classList.toggle('active', m === 'identify');
    document.getElementById('btnRegister').classList.toggle('active', m === 'register');
    document.getElementById('custRow').classList.toggle('show', m === 'register');
    clearResult();
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = 'status ' + cls;
  }

  function clearResult() {
    resultBox.classList.remove('show');
  }

  function showResult(data) {
    if (data.status === 'match') {
      document.getElementById('resultName').textContent  = data.customer.name;
      document.getElementById('resultPhone').textContent = data.customer.phone || 'No phone';
      document.getElementById('resultConf').textContent  = 'Confidence: ' + (data.confidence * 100).toFixed(1) + '%';
      resultBox.classList.add('show');
      setStatus('Customer identified', 'success');
    } else if (data.status === 'success') {
      document.getElementById('resultName').textContent  = 'Face registered';
      document.getElementById('resultPhone').textContent = '';
      document.getElementById('resultConf').textContent  = '';
      resultBox.classList.add('show');
      setStatus('Registration complete', 'success');
    } else if (data.status === 'no_match') {
      setStatus('No match found', 'error');
      clearResult();
    } else {
      setStatus(data.message || 'Error', 'error');
      clearResult();
    }
  }

  async function toggleCamera() {
    if (cameraOn) {
      FaceDetection.stopCamera(cameraStream);
      cameraStream = null;
      cameraOn = false;
      video.srcObject = null;
      placeholder.style.display = 'flex';
      video.style.display = 'none';
      btnCam.innerHTML = '<i class="fa-solid fa-video"></i> Start Camera';
      btnScan.disabled = true;
      setStatus('Ready', 'idle');
    } else {
      setStatus('Loading models...', 'scanning');
      btnCam.disabled = true;
      try {
        await FaceDetection.loadModels();
        cameraStream = await FaceDetection.startCamera(video);
        cameraOn = true;
        placeholder.style.display = 'none';
        video.style.display = 'block';
        btnCam.innerHTML = '<i class="fa-solid fa-video-slash"></i> Stop Camera';
        btnScan.disabled = false;
        setStatus('Camera ready', 'idle');
      } catch (err) {
        setStatus('Camera error: ' + err.message, 'error');
      } finally {
        btnCam.disabled = false;
      }
    }
  }

  async function doScan() {
    if (!cameraOn) return;
    btnScan.disabled = true;
    setStatus('Detecting face...', 'scanning');
    clearResult();

    try {
      // First check if face is visible
      const descriptor = await FaceDetection.getDescriptor(video);
      if (!descriptor) {
        setStatus('No face detected. Look at camera directly.', 'error');
        btnScan.disabled = false;
        return;
      }

      setStatus('Face found. Processing...', 'scanning');

      let result;
      if (mode === 'identify') {
        result = await FaceDetection.identifyFace(video);
      } else {
        const custId = document.getElementById('custId').value.trim();
        if (!custId) {
          setStatus('Enter customer ID first', 'error');
          btnScan.disabled = false;
          return;
        }
        result = await FaceDetection.registerFace(video, custId);
      }
      showResult(result);
    } catch (err) {
      setStatus('Scan failed: ' + err.message, 'error');
    } finally {
      btnScan.disabled = false;
    }
  }
</script>
</body>
</html>
