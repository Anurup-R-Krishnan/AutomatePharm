<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Selvam Medicals – Item Combination</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700&family=Jersey+15&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar-header.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/itemcombination.css') }}">
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="left-panel">
    <div class="logo">
      <div class="SM">SM</div>
      <div class="logo-text">
        <p>Selvam</p>
        <p>Medicals</p>
      </div>
    </div>
    <select class="side-bar-dropdown">
      <option value="" disabled selected hidden>Timeline...</option>
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>
    <p class="sec-label">MENU</p>
    <div class="row"><div class="opt"><i class="fa-solid fa-chart-line"></i><p class="opt-text">Sales</p></div></div>
    <div class="row active"><div class="opt"><i class="fa-solid fa-cart-shopping"></i><p class="opt-text">Purchase</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-list"></i><p class="opt-text">Item</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-users"></i><p class="opt-text">Masters</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-desktop"></i><p class="opt-text">System</p></div></div>
    <div class="row"><div class="opt"><i class="fa-solid fa-toolbox"></i><p class="opt-text">Utilities</p></div></div>
    <div class="row sms"><div class="opt"><i class="fa-solid fa-comment-dots"></i><p class="opt-text">SMS</p></div></div>
    <p class="sec-label other">OTHER</p>
    <div class="row settings"><div class="opt"><i class="fa-solid fa-gear"></i><p class="opt-text">Settings</p></div></div>
    <div class="spacer"></div>
    <div class="row logout"><div class="opt"><i class="fa-solid fa-right-from-bracket"></i><p class="opt-text">Logout</p></div></div>
  </div>

  <!-- RIGHT COLUMN -->
  <div class="main" id="mainPanel">

    <!-- HEADER -->
    <header class="header">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
      </div>
      <div class="fy">FY: 2026-2027</div>
      <div class="divider-1"></div>
      <div class="date-block">
        <span class="date-val" id="date-val"></span>
        <span class="day-val" id="day-val"></span>
      </div>
      <div class="divider-2"></div>
      <div class="clock" id="clock">00:00:00</div>
      <div class="divider-3"></div>
      <div class="user">
        <img src="{{ url_for('static', filename='images/user-profile.jpg') }}" alt="User">
        <span>Name</span>
      </div>
    </header>

    <!-- CONTENT AREA -->
    <div class="content-area">

      <!-- BREADCRUMB -->
      <div class="breadcrumb-bar">
        <span class="breadcrumb-parent">Purchase</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18L15 12L9 6"/>
        </svg>
        <span class="breadcrumb-current">Item Combination</span>
      </div>

      <!-- MAIN CONTENT -->
      <div class="prr-content">

        <!-- INFO SECTION -->
        <div class="prr-info">

          <!-- Row 1 -->
          <div class="prr-info-row">
            <label class="prr-info-label" for="prr-itemcode">Item Code</label>
            <span class="prr-info-colon">:</span>
            <div class="prr-input-wrap">
              <input type="text" class="prr-input" id="prr-itemcode">
            </div>

            <label class="prr-info-label prr-info-label--gap" for="prr-mfr">Mfr.</label>
            <span class="prr-info-colon">:</span>
            <div class="prr-input-wrap">
              <input type="text" class="prr-input" id="prr-mfr">
            </div>

            <label class="prr-info-label prr-info-label--gap" for="prr-locn">Locn.</label>
            <span class="prr-info-colon">:</span>
            <div class="prr-input-wrap">
              <input type="text" class="prr-input" id="prr-locn">
            </div>
          </div>

          <!-- Row 2 -->
          <div class="prr-info-row">
            <label class="prr-info-label" for="prr-combcode">Comb.Code</label>
            <span class="prr-info-colon">:</span>
            <div class="prr-input-wrap">
              <input type="text" class="prr-input" id="prr-combcode">
            </div>
          </div>

        </div>

        <!-- TABLE -->
        <div class="prr-table-wrap">
          <table class="prr-table" id="prrTable">
            <thead>
              <tr>
                <th class="prr-col-item">Item</th>
                <th class="prr-col-name">Item Name</th>
                <th class="prr-col-mfr">Mfr.</th>
                <th class="prr-col-pkg">Pkg</th>
                <th class="prr-col-stock">Stock</th>
                <th class="prr-col-offer">Offer</th>
                <th class="prr-col-purrate">Pur.Rate</th>
                <th class="prr-col-mrp">M.R.P</th>
                <th class="prr-col-loc">Loc</th>
                <th class="prr-col-remark">Remark</th>
              </tr>
            </thead>
            <tbody id="prrTableBody">
            </tbody>
          </table>
        </div>

        <!-- FOOTER DIVIDER -->
     

         <!-- TABLE -->
    <footer class="footer">
      <button class="action-btn active"   onclick="handleAction('Add')">Add</button>
      <button class="action-btn inactive">Modify</button>
      <button class="action-btn inactive">Delete</button>
      <button class="action-btn active"   onclick="handleAction('View')">View</button>
      <button class="action-btn active"   onclick="handleAction('Go To')">Go To</button>
      <button class="action-btn active"   onclick="handleAction('Next')">Next</button>
      <button class="action-btn active"   onclick="handleAction('Prior')">Prior</button>
      <button class="action-btn inactive">Options</button>
      <button class="action-btn active"   onclick="handleAction('Exit')">Exit</button>
    </footer>


      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/sidebar-header.js') }}"></script>
<script src="{{ url_for('static', filename='js/itemcombination.js') }}"></script>
</body>
</html>
