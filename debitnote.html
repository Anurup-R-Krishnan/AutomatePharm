<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Selvam Medicals</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@700&family=Jersey+15&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Inter, sans-serif; }

    body { background: #000; }

    .app {
       width: 100%;
       height: 100vh;
       display: flex;
    }

    /* ── SIDEBAR ── */
    .left-panel {
      width: 280px;
      height: 1034px;
      background: #0b0f17;
      padding: 20px;
      display: flex;
      flex-direction: column;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 40px;
    }

    .SM {
      width: 58px;
      height: 58px;
      background: #FF9900;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 28px;
      line-height: 1;
      font-family: 'JetBrains Mono', monospace;
    }

    .logo-text p:first-child {
      font-weight: bold;
      font-size: 18px;
      color: #fff;
    }

    .logo-text p:last-child {
      font-size: 18px;
      color: #BAB7B7;
    }

    .side-bar-dropdown {
      width: 100%;
      padding: 12px;
      background: #111827;
      border: none;
      border-radius: 10px;
      color: #cbd5e1;
      margin-bottom: 28px;
      font-size: 18px;
    }

    .sec-label {
      font-size: 18px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 32px;
    }

    .row { margin-bottom: 31px; }

    .row.sms { margin-bottom: 76px; }

    .sec-label.other {
      font-size: 18px;
      font-weight: 600;
      color: #80879A;
      margin-bottom: 40px;
    }

    .row.settings { margin-bottom: 15px; }

    .spacer { flex: 1; }

    .row.logout { margin-bottom: 68px; }

    .opt {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .opt i {
      width: 24px;
      height: 24px;
      font-size: 20px;
      color: #80879A;
    }

    .opt-text {
      font-size: 18px;
      font-weight: bold;
      color: #80879A;
      margin-left: 100px;
    }

    .opt:hover { background: #1A2035; }

    .opt:hover i,
    .opt:hover .opt-text { color: #D58615; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER (UPDATED) ── */
    .header {
      width: 1162px;
      height: 78px;
      min-height: 78px;
      background: #1A2035;
      border-bottom: 1px solid #595959;   /* stroke weight 1, color #595959 */
      display: flex;
      align-items: center;
      padding: 0 0 0 33px;                /* 33px gap from left border */
      gap: 0;
    }

    /* Search box */
    .search-box {
      width: 280px;
      height: 40px;
      background: #12141A;
      border-radius: 12px;
      border: none;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      flex-shrink: 0;
    }

    .search-box .fa-magnifying-glass {
      color: #6F6868;
      font-size: 16px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: #6F6868;
      font-family: Inter, sans-serif;
      font-size: 20px;
      font-weight: 400;
      flex: 1;
    }

    /* FY label — 47px after search box */
    .fy {
      margin-left: 47px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 28px;
      color: #989696;
      flex-shrink: 0;
    }

    /* Divider 1 — after FY */
    .divider-1 {
      width: 2px;
      height: 54px;
      background: rgba(152, 150, 150, 0.32);
      margin-left: 28px;
      flex-shrink: 0;
    }

    /* Date + Day block — 28px after divider */
    .date-block {
      margin-left: 28px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      line-height: 1.1;
      flex-shrink: 0;
    }

    .date-val {
      font-family: 'Jersey 15', cursive;
      font-size: 24px;
      color: #D69140;
    }

    .day-val {
      font-family: 'Jersey 15', cursive;
      font-size: 24px;
      color: #595959;
    }

    /* Divider 2 — after date block */
    .divider-2 {
      width: 2px;
      height: 54px;
      background: rgba(152, 150, 150, 0.32);
      margin-left: 28px;
      flex-shrink: 0;
    }

    /* Clock — 28px after divider 2 */
    .clock {
      margin-left: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 28px;
      color: #fff;
      flex-shrink: 0;
    }

    /* Divider 3 — 16px after clock */
    .divider-3 {
      width: 2px;
      height: 54px;
      background: rgba(152, 150, 150, 0.32);
      margin-left: 16px;
      flex-shrink: 0;
    }

    /* User — 19px after divider 3 */
    .user {
      margin-left: 19px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .user img {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      object-fit: cover;
    }

    .user span {
      font-family: Inter, sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #595959;
    }

    .content { flex: 1; padding: 36px; }
  </style>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="left-panel">
    <div class="logo">
      <div class="SM">SM</div>
      <div class="logo-text">
        <p>Selvam</p>
        <p>Medicals</p>
      </div>
    </div>

    <select class="side-bar-dropdown">
      <option value="" disabled selected hidden>Timeline...</option>
      <option>Daily</option>
      <option>Weekly</option>
      <option>Monthly</option>
    </select>

    <p class="sec-label">MENU</p>

    <div class="row">
      <div class="opt"><i class="fa-solid fa-chart-line"></i><p class="opt-text">Sales</p></div>
    </div>
    <div class="row">
      <div class="opt"><i class="fa-solid fa-cart-shopping"></i><p class="opt-text">Purchase</p></div>
    </div>
    <div class="row">
      <div class="opt"><i class="fa-solid fa-list"></i><p class="opt-text">Item</p></div>
    </div>
    <div class="row">
      <div class="opt"><i class="fa-solid fa-users"></i><p class="opt-text">Masters</p></div>
    </div>
    <div class="row">
      <div class="opt"><i class="fa-solid fa-desktop"></i><p class="opt-text">System</p></div>
    </div>
    <div class="row">
      <div class="opt"><i class="fa-solid fa-toolbox"></i><p class="opt-text">Utilities</p></div>
    </div>
    <div class="row sms">
      <div class="opt"><i class="fa-solid fa-comment-dots"></i><p class="opt-text">SMS</p></div>
    </div>

    <p class="sec-label other">OTHER</p>

    <div class="row settings">
      <div class="opt"><i class="fa-solid fa-gear"></i><p class="opt-text">Settings</p></div>
    </div>

    <div class="spacer"></div>

    <div class="row logout">
      <div class="opt"><i class="fa-solid fa-right-from-bracket"></i><p class="opt-text">Logout</p></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HEADER -->
    <header class="header">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Search">
      </div>

      <div class="fy">FY: 2026-2027</div>

      <div class="divider-1"></div>

      <div class="date-block">
        <span class="date-val" id="date-val"></span>
        <span class="day-val" id="day-val"></span>
      </div>

      <div class="divider-2"></div>

      <div class="clock" id="clock">00:00:00</div>

      <div class="divider-3"></div>

      <div class="user">
        <img src="https://via.placeholder.com/50" alt="User">
        <span>Name</span>
      </div>
    </header>

    <div class="content"></div>

  </div>
</div>

<script>
  const DAYS  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function pad(n){ return String(n).padStart(2,'0'); }

  function updateHeader() {
    const n = new Date();

    // Clock
    document.getElementById('clock').textContent =
      pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());

    // Date  e.g. "16 Apr 2026"
    document.getElementById('date-val').textContent =
      n.getDate() + ' ' + MONTHS[n.getMonth()] + ' ' + n.getFullYear();

    // Day  e.g. "Thursday"
    document.getElementById('day-val').textContent = DAYS[n.getDay()];
  }

  setInterval(updateHeader, 1000);
  updateHeader();
</script>

</body>
</html>
