<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debit Note</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html, body { height: 100%; }
        body { font-family:'Inter',sans-serif; background:#0A0D11; color:#fff; display:flex; flex-direction:column; min-height:100vh; }

        /* Header */
        header { background:#0E1117; border-bottom:1px solid rgba(108,108,108,0.4); }
        .header-inner { display:flex; align-items:center; gap:8px; padding:16px 24px; }
        .breadcrumb-parent { font-weight:600; font-size:16px; color:#9CA3AF; }
        .breadcrumb-current { font-weight:700; font-size:16px; color:#4ADE80; }

        /* Main */
        main { flex:1; display:flex; align-items:center; justify-content:center; padding:32px 16px; }

        /* Card */
        .card { width:100%; max-width:579px; background:#161A1F; border:1px solid rgba(104,104,104,0.58); border-radius:24px; overflow:hidden; }
        .card-spacer-top { height:63px; }
        .card-spacer-bottom { height:64px; }
        .divider { height:1px; background:rgba(108,108,108,0.53); }
        .form-body { display:flex; flex-direction:column; gap:14px; padding:20px 40px; }

        /* Form rows */
        .form-row { display:flex; align-items:center; gap:12px; }
        .form-label { flex:1; font-weight:600; font-size:clamp(15px,2.2vw,25px); color:#80879A; white-space:nowrap; }
        .form-colon { font-weight:600; font-size:clamp(15px,2.2vw,25px); color:#80879A; flex-shrink:0; }
        .input-wrapper { display:flex; align-items:center; gap:6px; width:140px; height:44px; border-radius:10px; background:#1C2028; border:1px solid rgba(150,150,150,0.29); padding:0 10px; flex-shrink:0; }
        .form-input { flex:1; min-width:0; background:transparent; color:#fff; font-family:Inter,sans-serif; font-weight:600; font-size:15px; border:none; outline:none; }
        input[type="date"] { color-scheme:dark; width:0; flex:1; }
        input[type="date"]::-webkit-calendar-picker-indicator { display:none; }

        /* Footer */
        footer { background:#0E1117; border-top:1px solid rgba(108,108,108,0.4); }
        .footer-inner { display:flex; align-items:center; justify-content:space-between; height:68px; padding:0 24px; }
        .action-btn { background:none; border:none; font-family:Inter,sans-serif; font-weight:700; font-size:clamp(12px,1.4vw,16px); padding:4px 2px; }
        .action-btn.active { color:#F59E0B; cursor:pointer; }
        .action-btn.active:hover { opacity:0.8; }
        .action-btn.inactive { color:rgba(255,255,255,0.25); cursor:default; }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <span class="breadcrumb-parent">Sales</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18L15 12L9 6"/></svg>
            <span class="breadcrumb-current">Debit Note</span>
        </div>
    </header>

    <main>
        <div class="card">
            <div class="card-spacer-top"></div>
            <div class="divider"></div>
            <div class="form-body">
                <div class="form-row">
                    <label class="form-label" for="debitNoteNo">Debit Note No.</label>
                    <span class="form-colon">:</span>
                    <div class="input-wrapper"><input type="text" class="form-input" id="debitNoteNo"></div>
                </div>
                <div class="form-row">
                    <label class="form-label" for="debitDate">Debit Date</label>
                    <span class="form-colon">:</span>
                    <div class="input-wrapper">
                        <input type="date" class="form-input" id="debitDate">
                        <span id="calendarTrigger" style="cursor:pointer;flex-shrink:0;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M8 2V6"/><path d="M16 2V6"/><path d="M19 4H5C3.9 4 3 4.9 3 6V20C3 21.1 3.9 22 5 22H19C20.1 22 21 21.1 21 20V6C21 4.9 20.1 4 19 4Z"/><path d="M3 10H21"/><path d="M8 14H8.01"/><path d="M12 14H12.01"/><path d="M16 14H16.01"/><path d="M8 18H8.01"/><path d="M12 18H12.01"/>
                            </svg>
                        </span>
                    </div>
                </div>
                <div class="form-row">
                    <label class="form-label" for="customerCode">Customer Code</label>
                    <span class="form-colon">:</span>
                    <div class="input-wrapper"><input type="text" class="form-input" id="customerCode"></div>
                </div>
                <div class="form-row">
                    <label class="form-label" for="amount">Amount</label>
                    <span class="form-colon">:</span>
                    <div class="input-wrapper"><input type="text" class="form-input" id="amount" inputmode="decimal"></div>
                </div>
                <div class="form-row">
                    <label class="form-label" for="remarks">Remarks</label>
                    <span class="form-colon">:</span>
                    <div class="input-wrapper"><input type="text" class="form-input" id="remarks"></div>
                </div>
            </div>
            <div class="divider" style="margin-top:20px;"></div>
            <div class="card-spacer-bottom"></div>
        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <button class="action-btn active"   onclick="handleAction('Add')">Add</button>
            <button class="action-btn inactive">Modify</button>
            <button class="action-btn inactive">Delete</button>
            <button class="action-btn active"   onclick="handleAction('View')">View</button>
            <button class="action-btn active"   onclick="handleAction('Go To')">Go To</button>
            <button class="action-btn active"   onclick="handleAction('Next')">Next</button>
            <button class="action-btn active"   onclick="handleAction('Prior')">Prior</button>
            <button class="action-btn inactive">Options</button>
            <button class="action-btn active"   onclick="handleAction('Exit')">Exit</button>
        </div>
    </footer>

    <script>
        document.getElementById('calendarTrigger').addEventListener('click', function() {
            var d = document.getElementById('debitDate');
            d.showPicker ? d.showPicker() : d.focus();
        });

        document.getElementById('amount').addEventListener('input', function() {
            this.value = this.value.replace(/[^\d.]/g, '');
        });

        var fields = ['debitNoteNo','debitDate','customerCode','amount','remarks'];
        var formData = {};
        fields.forEach(function(id, i) {
            formData[id] = '';
            var el = document.getElementById(id);
            el.addEventListener('input', function() { formData[id] = this.value; });
            el.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    var next = document.getElementById(fields[i+1]);
                    if (next) next.focus();
                }
            });
        });

        function handleAction(name) {
            if (name === 'Add') {
                fields.forEach(function(id) { formData[id]=''; document.getElementById(id).value=''; });
                document.getElementById('debitNoteNo').focus();
            }
            if (name === 'Exit') { if(confirm('Exit?')) window.close(); }
            console.log('Action:', name, formData);
        }

        document.getElementById('debitNoteNo').focus();
    </script>
</body>
</html>
